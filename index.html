<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レーンよけゲーム</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game-wrap">
  <canvas id="game-canvas"></canvas>

  <div id="hit-flash"></div>

  <div id="hud">
    <div id="score">SCORE: 0</div>
    <div id="combo"></div>
    <div id="hits">HIT: 0/3</div>
    <div id="best">BEST: 0</div>
  </div>

  <div id="start-screen" class="overlay">
    <h1>レーンよけゲーム</h1>
    <p class="rule">奥から迫るドミノ板をよけよう。3回当たったら終了(スコア15点ごとに1回復)。</p>
    <div class="keys">
      <div class="key-row">
        <button class="key rebind-btn" data-group="0">C</button>
        押している間だけレーン2へ移動(離すとレーン1へ)
      </div>
      <div class="key-row">
        <button class="key rebind-btn" data-group="1">B</button>
        押している間だけレーン3へ移動(離すとレーン4へ)
      </div>
    </div>
    <p class="rebind-hint">キーのボタンをクリックしてから押したいキーを入力すると変更できます</p>
    <button id="start-btn">スタート (Enter)</button>
  </div>

  <div id="gameover-screen" class="overlay hidden">
    <h1>GAME OVER</h1>
    <p id="final-score">SCORE: 0</p>
    <p id="best-score">BEST: 0</p>
    <button id="restart-btn">もう一度 (Enter)</button>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
